<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugestões - Sistema de Sugestões WEG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sistema de Sugestões WEG</h1>
        <p>Envie suas ideias para melhorar nossa empresa!</p>
        <button id="logout" class="logout-btn">Sair</button>
    </header>
    <main>
            <form id="suggestionForm" action="/submit-suggestion" method="POST">
            <div class="form-group">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="department">Departamento:</label>
                <select id="department" name="department">
                    <option value="">Selecione</option>
                    <option value="rh">Recursos Humanos</option>
                    <option value="ti">Tecnologia da Informação</option>
                    <option value="vendas">Vendas</option>
                    <option value="marketing">Marketing</option>
                    <option value="financeiro">Financeiro</option>
                    <option value="outros">Outros</option>
                </select>
            </div>
            <div class="form-group">
                <label for="category">Categoria da Sugestão:</label>
                <select id="category" name="category" required>
                    <option value="">Selecione</option>
                    <option value="processos">Melhoria de Processos</option>
                    <option value="produtos">Novos Produtos/Serviços</option>
                    <option value="ambiente">Ambiente de Trabalho</option>
                    <option value="tecnologia">Tecnologia</option>
                    <option value="outros">Outros</option>
                </select>
            </div>
            <div class="form-group">
                <label for="suggestion">Sugestão:</label>
                <textarea id="suggestion" name="suggestion" rows="5" required></textarea>
            </div>
            <button type="submit">Enviar Sugestão</button>
        </form>

        <section class="suggestion-list">
            <div class="section-header">
                <h2>Últimas sugestões</h2>
                <p>Aqui você vê as sugestões já enviadas com o nome do colaborador.</p>
            </div>
            <div id="suggestionCards" class="suggestion-cards">
                <p class="empty-state">Carregando sugestões...</p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 WEG. Todos os direitos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
